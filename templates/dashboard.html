<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    width:800px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:10px;
}

input{
    padding:8px;
    margin:5px;
}

button{
    padding:8px 15px;
    background:#4CAF50;
    color:white;
    border:none;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Management Dashboard</h2>

<h3>Add Student</h3>

<form action="/add" method="POST">

<input type="text" name="name" placeholder="Name" required>

<input type="text" name="course" placeholder="Course" required>

<input type="number" name="marks" placeholder="Marks" required>

<button type="submit">Add</button>

</form>

<hr>

<h3>Search Student</h3>

<form action="/search" method="GET">

<input type="text" name="name" placeholder="Student Name">

<button type="submit">Search</button>

</form>

<hr>

<h3>All Students</h3>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Marks</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>
<td>{{s.id}}</td>
<td>{{s.name}}</td>
<td>{{s.course}}</td>
<td>{{s.marks}}</td>

<td>
<a href="/delete/{{s.id}}">
<button style="background:red;">Delete</button>
</a>
</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/logout">
<button style="background:red;">Logout</button>
</a>

</div>

</body>
</html>
