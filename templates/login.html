<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    width:350px;
    margin:auto;
    margin-top:120px;
    background:white;
    padding:30px;
    border-radius:8px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    padding:10px 20px;
    background:#4CAF50;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<form action="/login" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
